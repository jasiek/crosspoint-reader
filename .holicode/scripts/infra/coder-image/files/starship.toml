add_newline     = false
command_timeout = 800
# ASCII-only characters — Coder web terminal does not ship a Nerd Font.
format = """$custom$directory$git_branch$git_status$cmd_duration$status$character"""

[custom.coder]
command = 'printf "%s" "${CODER_WORKSPACE_NAME:-${HOSTNAME%%.*}}"'
when    = 'test -n "$CODER_WORKSPACE_NAME" || test -n "$CODER"'
format  = '[coder:$output]($style) '
style   = 'dimmed bold blue'

[directory]
truncation_length         = 3
truncate_to_repo          = true
fish_style_pwd_dir_length = 1

[git_branch]
format = '[$symbol$branch]($style) '
symbol = 'git:'

[git_status]
format   = '([$all_status$ahead_behind]($style) )'
ahead    = '>>${count}'
behind   = '<<${count}'
diverged = '<>${ahead_count}${behind_count}'
modified = '!'
staged   = '+'
deleted  = 'x'
untracked = '?'
stashed  = '$'

[cmd_duration]
min_time = 2000
format   = '[took $duration]($style) '

[status]
disabled = false
format   = '[exit:$status]($style) '

[character]
success_symbol = '$'
error_symbol   = '$'
